name: Sync to OSS

on:
  push:
    branches:
      - main
    paths:
      - 'index.json'
      - 'agent-capabilities.json'
      - 'notebook-tools.json'
      - 'skills/**'
      - 'agents/**'
      - 'prompts/**'
      - 'mcps/**'
      - '.github/workflows/sync-oss.yml'
  workflow_dispatch:

concurrency:
  group: sync-oss-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      OSS_BUCKET: hydrocoder
      OSS_PREFIX: skillsmarket
      OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build publish directory
        shell: bash
        run: |
          set -euo pipefail

          rm -rf publish
          mkdir -p publish

          for file in index.json agent-capabilities.json notebook-tools.json; do
            if [ -f "$file" ]; then
              cp "$file" publish/
            fi
          done

          for dir in skills agents prompts mcps; do
            if [ -d "$dir" ]; then
              cp -R "$dir" publish/
            fi
          done

          find publish -maxdepth 3 -type f | sort

      - name: Install ossutil
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          ossutil --version

      - name: Sync publish directory to OSS
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${OSS_ACCESS_KEY_ID:-}" ] || [ -z "${OSS_ACCESS_KEY_SECRET:-}" ]; then
            echo "Missing OSS credentials. Configure ALIYUN_OSS_ACCESS_KEY_ID and ALIYUN_OSS_ACCESS_KEY_SECRET."
            exit 1
          fi

          ossutil sync publish/ "oss://${OSS_BUCKET}/${OSS_PREFIX}/" \
            --delete \
            --update \
            --force \
            -e "${OSS_ENDPOINT}" \
            -i "${OSS_ACCESS_KEY_ID}" \
            -k "${OSS_ACCESS_KEY_SECRET}"

      - name: Verify uploaded index
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://skillsmarket.myseek.fun/${OSS_PREFIX}/index.json" > /tmp/index.json
          test -s /tmp/index.json
